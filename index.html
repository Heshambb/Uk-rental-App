<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0B3D2E" />
<title>Credentia — Verified Rental Reputation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ─── Our theme (fintech feel kept from previous build) ─── */
  :root {
    --bg: #F4F1EA;
    --surface: #FFFFFF;
    --surface-2: #FBF8F2;
    --ink: #0F1A14;
    --ink-soft: #4A5751;
    --ink-mute: #8A938E;
    --line: #E4DED1;
    --brand: #0B3D2E;
    --brand-2: #14583F;
    --accent: #D97A3C;
    --accent-2: #F4A261;
    --accent-soft: #FDF3E7;
    --good: #2E7D5B;
    --warn: #C9892E;
    --bad: #B4452B;
    --shadow-sm: 0 1px 2px rgba(15,26,20,.04), 0 2px 6px rgba(15,26,20,.04);
    --shadow-md: 0 6px 20px rgba(15,26,20,.08), 0 2px 6px rgba(15,26,20,.04);
    --shadow-lg: 0 24px 60px rgba(15,26,20,.18);
    --r-sm: 10px; --r-md: 14px; --r-lg: 20px;
    --display: 'Fraunces', 'Times New Roman', serif;
    --body: 'Inter Tight', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--body); background: var(--bg); color: var(--ink);
    font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body::before {
    content:""; position: fixed; inset: 0; pointer-events: none;
    background-image: radial-gradient(circle at 1px 1px, rgba(15,26,20,.025) 1px, transparent 0);
    background-size: 3px 3px; z-index: 1;
  }
  .app { position: relative; min-height: 100vh; z-index: 2; }
  a { color: inherit; text-decoration: none; cursor: pointer; }

  /* ─── Topbar ─── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(244,241,234,.88);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    max-width: 1180px; margin: 0 auto; padding: 14px 22px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px; background: var(--brand);
    color: #fff; display: grid; place-items: center;
    font-family: var(--display); font-weight: 700; font-size: 17px;
    box-shadow: var(--shadow-sm);
  }
  .brand-name { font-family: var(--display); font-weight: 600; font-size: 21px; letter-spacing: -.01em; }
  .brand-name em { font-style: italic; color: var(--accent); font-weight: 600; }
  .top-nav { display: none; gap: 4px; }
  @media (min-width: 768px) { .top-nav { display: flex; } }
  .top-nav a {
    padding: 6px 12px; font-size: 14px; color: var(--ink-soft);
    border-radius: 8px; transition: all .15s ease;
  }
  .top-nav a:hover { color: var(--brand); background: var(--surface); }
  .role-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line);
    font-size: 12px; font-weight: 500; color: var(--ink-soft);
  }
  .role-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--good); }
  .top-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--surface);
    display: grid; place-items: center; cursor: pointer;
    color: var(--ink-soft); transition: all .15s ease;
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--ink-mute); }

  /* ─── Buttons ─── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px 18px; border-radius: 10px;
    font-family: var(--body); font-weight: 600; font-size: 14px;
    border: 1px solid transparent; cursor: pointer;
    transition: all .15s ease; white-space: nowrap;
  }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-primary:hover { background: var(--brand-2); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn-ghost:hover { background: var(--surface); border-color: var(--ink-mute); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { filter: brightness(.95); }
  .btn-danger { background: transparent; color: var(--bad); border-color: rgba(180,69,43,.3); }
  .btn-danger:hover { background: rgba(180,69,43,.06); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .btn-block { width: 100%; }

  /* ─── Layout ─── */
  main { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .container-narrow { max-width: 880px; margin: 0 auto; }

  /* ─── Cards ─── */
  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 22px; box-shadow: var(--shadow-sm);
  }
  .card + .card { margin-top: 14px; }
  h4.section { font-family: var(--display); font-size: 18px; font-weight: 600; margin-bottom: 12px; letter-spacing: -.01em; }
  .section-sub { color: var(--ink-mute); font-size: 12px; margin-bottom: 14px; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .08em; }

  /* ─── Landing ─── */
  /* New landing header */
  .l-header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(244,241,234,.92);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .l-header-inner {
    max-width: 1200px; margin: 0 auto; padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
  }
  .l-nav { display: none; gap: 4px; }
  @media (min-width: 880px) { .l-nav { display: flex; } }
  .l-nav a {
    padding: 8px 14px; font-size: 14px; font-weight: 500; color: var(--ink-soft);
    border-radius: 8px; transition: all .15s; cursor: pointer;
  }
  .l-nav a:hover { color: var(--brand); background: var(--surface); }
  .l-header-actions { display: flex; gap: 8px; align-items: center; }

  /* Hero */
  .l-hero {
    padding: 80px 24px 60px; position: relative;
    text-align: center; overflow: hidden;
  }
  .l-hero-bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .l-hero-bg::before, .l-hero-bg::after {
    content: ""; position: absolute; border-radius: 50%; filter: blur(80px);
  }
  .l-hero-bg::before { width: 460px; height: 460px; background: var(--brand); top: -180px; left: -120px; opacity: .25; }
  .l-hero-bg::after { width: 380px; height: 380px; background: var(--accent); top: -80px; right: -120px; opacity: .22; }
  .l-hero-inner { max-width: 880px; margin: 0 auto; position: relative; }

  /* How it works — step cards */
  .l-section { padding: 80px 24px; max-width: 1200px; margin: 0 auto; }
  .l-section h2 {
    font-family: var(--display); font-size: clamp(28px, 4vw, 42px);
    font-weight: 600; letter-spacing: -.02em; text-align: center;
    margin-bottom: 12px;
  }
  .l-section h2 em { font-style: italic; color: var(--accent); }
  .l-section .l-subtitle {
    text-align: center; color: var(--ink-soft); font-size: 17px;
    max-width: 580px; margin: 0 auto 48px;
  }
  .steps-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; position: relative; }
  .step-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 28px 24px;
    position: relative; box-shadow: var(--shadow-sm);
    transition: all .2s ease;
  }
  .step-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
  .step-num {
    width: 36px; height: 36px; border-radius: 12px;
    background: var(--brand); color: #fff;
    display: grid; place-items: center;
    font-family: var(--display); font-size: 18px; font-weight: 600;
    margin-bottom: 16px;
  }
  .step-card h3 { font-family: var(--display); font-size: 20px; font-weight: 600; margin-bottom: 8px; letter-spacing: -.01em; }
  .step-card p { font-size: 14px; color: var(--ink-soft); }

  /* Benefits — two-column for tenants vs landlords */
  .l-benefits {
    background: linear-gradient(180deg, transparent 0%, var(--surface-2) 100%);
  }
  .benefits-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
  .benefit-col {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 36px 28px;
    box-shadow: var(--shadow-sm);
  }
  .benefit-col .role-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .04em;
    margin-bottom: 16px;
  }
  .benefit-col.tenant .role-tag { background: rgba(217,122,60,.12); color: var(--accent); }
  .benefit-col.landlord .role-tag { background: rgba(11,61,46,.1); color: var(--brand); }
  .benefit-col h3 { font-family: var(--display); font-size: 26px; font-weight: 600; letter-spacing: -.01em; margin-bottom: 16px; }
  .benefit-col ul { list-style: none; padding: 0; margin: 0; }
  .benefit-col li {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px dashed var(--line);
    font-size: 15px; color: var(--ink-soft);
  }
  .benefit-col li:last-child { border-bottom: 0; }
  .benefit-col li .check {
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(46,125,91,.12); color: var(--good);
    display: grid; place-items: center; flex-shrink: 0;
  }

  /* Dual CTA section */
  .l-cta {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
    color: #fff; padding: 80px 24px;
    position: relative; overflow: hidden;
  }
  .l-cta::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 100% 0%, rgba(217,122,60,.25), transparent 60%);
    pointer-events: none;
  }
  .l-cta-inner { max-width: 880px; margin: 0 auto; text-align: center; position: relative; }
  .l-cta h2 {
    font-family: var(--display); font-size: clamp(28px, 4vw, 42px);
    font-weight: 600; letter-spacing: -.02em; margin-bottom: 12px;
  }
  .l-cta .l-subtitle { color: rgba(255,255,255,.85); margin-bottom: 36px; }
  .cta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 640px; margin: 0 auto; }
  @media (max-width: 600px) { .cta-row { grid-template-columns: 1fr; } }
  .cta-card {
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
    border-radius: var(--r-lg); padding: 28px 22px;
    text-align: left; cursor: pointer;
    transition: all .2s ease;
    backdrop-filter: blur(6px);
  }
  .cta-card:hover { background: rgba(255,255,255,.14); transform: translateY(-2px); }
  .cta-card .cta-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(255,255,255,.16);
    display: grid; place-items: center; margin-bottom: 14px;
  }
  .cta-card h3 { font-family: var(--display); font-size: 20px; font-weight: 600; letter-spacing: -.01em; margin-bottom: 6px; }
  .cta-card p { font-size: 14px; color: rgba(255,255,255,.78); margin-bottom: 14px; }
  .cta-card .arrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 600; color: var(--accent-2);
  }
  .cta-card:hover .arrow { gap: 10px; }

  /* Footer */
  .l-footer {
    background: var(--surface); border-top: 1px solid var(--line);
    padding: 56px 24px 32px;
  }
  .l-footer-inner { max-width: 1200px; margin: 0 auto; }
  .l-footer-grid {
    display: grid; grid-template-columns: 1.4fr repeat(3, 1fr);
    gap: 32px; margin-bottom: 40px;
  }
  @media (max-width: 760px) { .l-footer-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .l-footer-grid { grid-template-columns: 1fr; } }
  .l-footer .brand-block { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .l-footer .brand-block .brand-name { font-size: 19px; }
  .l-footer .tagline { font-size: 13px; color: var(--ink-soft); max-width: 280px; }
  .l-footer h4 {
    font-size: 12px; font-weight: 600; color: var(--ink); letter-spacing: .06em;
    text-transform: uppercase; margin-bottom: 14px;
  }
  .l-footer ul { list-style: none; padding: 0; margin: 0; }
  .l-footer li { margin-bottom: 8px; }
  .l-footer li a {
    font-size: 14px; color: var(--ink-soft);
    transition: color .15s;
  }
  .l-footer li a:hover { color: var(--brand); }
  .l-footer-bottom {
    padding-top: 24px; border-top: 1px solid var(--line);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    font-size: 12px; color: var(--ink-mute);
  }
  .l-footer-bottom .links { display: flex; gap: 16px; }
  .l-footer-bottom .links a:hover { color: var(--brand); }
  .l-footer-social { display: flex; gap: 8px; }
  .l-footer-social a {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--line);
    display: grid; place-items: center; color: var(--ink-soft);
    transition: all .15s;
  }
  .l-footer-social a:hover { color: var(--brand); border-color: var(--brand); background: var(--surface-2); }

  /* Old landing styles kept for fallback compatibility */
  .landing-hero {
    min-height: calc(100vh - 70px);
    display: flex; align-items: center; justify-content: center;
    padding: 60px 22px; position: relative;
  }
  .landing-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .landing-bg::before, .landing-bg::after {
    content: ""; position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: .3;
  }
  .landing-bg::before { width: 460px; height: 460px; background: var(--brand); top: -120px; left: -120px; }
  .landing-bg::after { width: 380px; height: 380px; background: var(--accent); bottom: -100px; right: -80px; opacity: .22; }
  .landing-card { max-width: 880px; width: 100%; position: relative; text-align: center; }
  .eyebrow {
    display: inline-flex; gap: 8px; align-items: center;
    padding: 6px 12px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line);
    font-size: 12px; font-weight: 500; color: var(--ink-soft);
    letter-spacing: .02em; text-transform: uppercase;
    box-shadow: var(--shadow-sm);
  }
  .eyebrow .ping {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 0 rgba(217,122,60,.6);
    animation: ping 1.8s ease-out infinite;
  }
  @keyframes ping {
    0% { box-shadow: 0 0 0 0 rgba(217,122,60,.6); }
    100% { box-shadow: 0 0 0 14px rgba(217,122,60,0); }
  }
  h1.hero {
    font-family: var(--display); font-weight: 600;
    font-size: clamp(40px, 7vw, 76px);
    line-height: 1.02; letter-spacing: -.025em;
    margin: 22px 0 14px;
  }
  h1.hero em { font-style: italic; color: var(--accent); }
  .hero-sub { font-size: 17px; color: var(--ink-soft); max-width: 580px; margin: 0 auto 32px; }
  .hero-cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .features-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px; margin-top: 60px;
    max-width: 880px;
  }
  .feature-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 22px; text-align: left;
    box-shadow: var(--shadow-sm);
  }
  .feature-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: rgba(217,122,60,.12); color: var(--accent);
    display: grid; place-items: center; margin-bottom: 14px;
  }
  .feature-card h3 { font-family: var(--display); font-size: 18px; font-weight: 600; margin-bottom: 6px; letter-spacing: -.01em; }
  .feature-card p { font-size: 14px; color: var(--ink-soft); }
  .footer-note { margin-top: 40px; font-size: 12px; color: var(--ink-mute); }

  /* ─── Auth ─── */
  .auth-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .auth-box {
    max-width: 420px; width: 100%;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 32px;
    box-shadow: var(--shadow-md);
  }
  .auth-box .brand-block { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .auth-box h2 { font-family: var(--display); font-size: 26px; margin-bottom: 6px; letter-spacing: -.01em; font-weight: 600; }
  .auth-box .auth-sub { font-size: 14px; color: var(--ink-soft); margin-bottom: 24px; }
  .role-toggle {
    display: flex; gap: 0; background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 10px; padding: 4px; margin-bottom: 18px;
  }
  .role-toggle button {
    flex: 1; padding: 8px; background: transparent; border: 0;
    font-family: inherit; font-size: 14px; font-weight: 500;
    color: var(--ink-soft); cursor: pointer; border-radius: 6px;
    transition: all .15s;
  }
  .role-toggle button.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.06); font-weight: 600; }
  .demo-hint {
    margin-top: 16px; padding: 12px;
    background: var(--surface-2); border-radius: 10px;
    font-size: 12px; color: var(--ink-soft);
    border-left: 3px solid var(--accent);
  }
  .demo-hint b { color: var(--ink); }

  /* ─── Form ─── */
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--ink-soft); letter-spacing: .02em; text-transform: uppercase; }
  .field input, .field select, .field textarea {
    font-family: var(--body); font-size: 15px;
    padding: 11px 13px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--surface-2);
    color: var(--ink); transition: all .15s ease; outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--brand); background: var(--surface);
    box-shadow: 0 0 0 3px rgba(11,61,46,.08);
  }
  .field-hint { font-size: 12px; color: var(--ink-mute); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  .field.full { grid-column: 1 / -1; }

  /* ─── Dashboard ─── */
  .dash-layout {
    display: grid; grid-template-columns: 220px 1fr; gap: 24px;
    max-width: 1200px; margin: 0 auto; padding: 24px;
  }
  @media (max-width: 880px) { .dash-layout { grid-template-columns: 1fr; padding: 16px; } }
  .dash-side {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 14px;
    box-shadow: var(--shadow-sm);
    height: fit-content; position: sticky; top: 80px;
  }
  @media (max-width: 880px) { .dash-side { position: static; overflow-x: auto; } }
  @media (max-width: 880px) { .dash-side .side-links { display: flex; gap: 4px; } .side-link { white-space: nowrap; } }
  .side-link {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    font-size: 14px; font-weight: 500;
    color: var(--ink-soft); cursor: pointer; transition: all .15s;
  }
  .side-link:hover { background: var(--surface-2); color: var(--ink); }
  .side-link.active { background: var(--brand); color: #fff; }
  .side-link .icon { display: inline-flex; }

  /* ─── Stat grid ─── */
  .stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 18px; box-shadow: var(--shadow-sm);
  }
  .stat-card .lbl { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .stat-card .val { font-family: var(--display); font-weight: 600; font-size: 28px; line-height: 1; }
  .stat-card .delta { font-size: 12px; color: var(--good); margin-top: 4px; }

  /* ─── Reputation hero ─── */
  .rep-hero {
    display: flex; align-items: center; gap: 24px;
    padding: 24px; margin-bottom: 16px;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
    color: #fff; border-radius: var(--r-lg);
    box-shadow: var(--shadow-md);

  screen: 'landing',
  tab: 'overview',
  user: null,
  profile: null,
  tenancies: [],
  documents: [],

};

/* === INIT === */
function init() {
  try {
    const persisted = localStorage.getItem('credentia.session');
    if (persisted) {
      const s = JSON.parse(persisted);
      if (s && s.user) {
        state.user = s.user; state.profile = s.profile;
        state.tenancies = s.tenancies || [];
        state.documents = s.documents || [];
        state.shareSettings = s.shareSettings || { ...SEED_SHARE_SETTINGS };
        state.shareLinks = s.shareLinks || [];
      }
    }
  } catch(e) {
    console.warn('Failed to read persisted session:', e.message);
    try { localStorage.removeItem('credentia.session'); } catch(_) {}
  }
  // Wire feedback modal listeners now that DOM is ready
  const sr = document.getElementById('starRow');
  const pg = document.getElementById('pillGroup');
  if (sr) sr.addEventListener('click', (e) => {
    const b = e.target.closest('.star'); if (!b) return;
    state.fb.stars = Number(b.dataset.v);
    $$('#starRow .star').forEach((s,i) => s.classList.toggle('active', i < state.fb.stars));
  });
  if (pg) pg.addEventListener('click', (e) => {
    const p = e.target.closest('.pill'); if (!p) return;
    const t = p.dataset.tag;
    if (state.fb.tags.has(t)) { state.fb.tags.delete(t); p.classList.remove('selected'); }
    else { state.fb.tags.add(t); p.classList.add('selected'); }
  });
  renderLanding();
}
window.addEventListener('DOMContentLoaded', init);

/* === HELPERS === */
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = (name) => name.split(/\s+/).map(n => n[0]).slice(0,2).join('').toUpperCase();

function showToast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__tt); window.__tt = setTimeout(() => t.classList.remove('show'), 2400);
}
function fmtDate(d) {
  if (!d) return 'Present';
  const [y, m] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[Number(m)-1]} ${y}`;
}
function calcReputationScore() {
  if (!state.tenancies.length) return 0;
  const visible = state.tenancies.filter(t => !t.hidden);
  if (!visible.length) return 0;
  const avgRating = visible.reduce((s, t) => s + (t.rating || 0), 0) / visible.length;
  const verifiedRatio = visible.filter(t => t.thirdPartyVerified).length / visible.length;
  return Math.round((avgRating / 5) * 80 + verifiedRatio * 20);
}
function renderStars(rating, max=5) {
  let html = '<span class="stars">';
  for (let i = 1; i <= max; i++) html += `<span class="s ${i <= rating ? 'f' : ''}">★</span>`;
  html += '</span>';
  return html;
}
function generateToken(len=16) {
  const chars = 'abcdef0123456789'; let t = '';
  for (let i = 0; i < len; i++) t += chars[Math.floor(Math.random() * 16)];
  return t;
}
function persistSession() {
  if (!state.user) return;
  try {
    localStorage.setItem('credentia.session', JSON.stringify({
      user: state.user, profile: state.profile,
      tenancies: state.tenancies, documents: state.documents,
      shareSettings: state.shareSettings, shareLinks: state.shareLinks,
    }));
  } catch(e) {
    // localStorage blocked (Unity WebView, private mode, quota). Session lives in memory only.
    console.warn('Session persistence unavailable:', e.message);
  }
}
function setShellUI() {
  const showShell = state.user && state.screen === 'dashboard';
  $('#topbar').classList.toggle('hidden', !showShell);
  $('#fab').classList.toggle('hidden', !state.user);
  if (state.user) {
    $('#roleLabel').textContent = `${state.user.role === 'tenant' ? 'Tenant' : 'Landlord'} · ${state.user.name.split(' ')[0]}`;
  }
}

function submitLogin(e) {
  e.preventDefault();
  const errEl = $('#loginError');
  if (errEl) errEl.style.display = 'none';
  const email = $('#li-email').value.trim().toLowerCase();
  const password = $('#li-pass').value;
  let account = null;
  if (email === DEMO_ACCOUNTS.tenant.email && password === DEMO_ACCOUNTS.tenant.password) account = DEMO_ACCOUNTS.tenant;
  else if (email === DEMO_ACCOUNTS.landlord.email && password === DEMO_ACCOUNTS.landlord.password) account = DEMO_ACCOUNTS.landlord;
  else {
    if (errEl) {
      errEl.textContent = 'Invalid credentials. Use demo@credentia.app or landlord@credentia.app with password demo1234.';
      errEl.style.display = 'block';
    }
    showToast('Invalid credentials');
    return;
  }

  try {
    state.user = account.user;
    state.profile = { ...account.profile };
    if (state.user.role === 'tenant' && state.tenancies.length === 0) {
      state.tenancies = SEED_TENANCIES.map(t => ({ ...t }));

    showToast(`Welcome back, ${state.user.name.split(' ')[0]}`);

    console.error('Login render failed:', err);

    { key: 'profile',    label: 'Profile',    ic: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' },
    { key: 'tenancies',  label: 'Tenancies',  ic: '<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>' },
    { key: 'documents',  label: 'Documents',  ic: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>' },
    { key: 'share',      label: 'Share',      ic: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/>' },
    { key: 'search',     label: 'Search',     ic: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>' },
  ];

  $('#main').innerHTML = `
    <div class="dash-layout screen">
      <aside class="dash-side">
        <div class="side-links">
          ${tabs.map(t => `
            <div class="side-link ${state.tab===t.key?'active':''}" onclick="switchTab('${t.key}')">
              <span class="icon"><svg class="ic" viewBox="0 0 24 24">${t.ic}</svg></span>
              ${t.label}
            </div>
          `).join('')}
        </div>
      </aside>
      <div id="dashContent"></div>
    </div>
  `;
  renderTab();
}

function switchTab(key) { state.tab = key; renderDashboard(); }

function renderTab() {
  const m = $('#dashContent');
  if (!m) return;
  if (state.tab === 'overview') m.innerHTML = renderOverview();
  else if (state.tab === 'profile') m.innerHTML = renderProfileTab();
  else if (state.tab === 'tenancies') m.innerHTML = renderTenanciesTab();
  else if (state.tab === 'documents') m.innerHTML = renderDocumentsTab();
  else if (state.tab === 'share') m.innerHTML = renderShareTab();
  else if (state.tab === 'search') m.innerHTML = renderSearchTab();
}

/* ─── Overview ─── */
function renderOverview() {
  const score = calcReputationScore();
  const r = 60;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - score / 100);
  const avgRating = state.tenancies.length
    ? (state.tenancies.reduce((s,t) => s + (t.rating||0), 0) / state.tenancies.length).toFixed(1)
    : '—';
  const verifiedCount = state.tenancies.filter(t => t.thirdPartyVerified).length;

  return `
    <div class="rep-hero">
      <div class="score-ring">
        <svg viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="${r}" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="10"/>
          <circle cx="70" cy="70" r="${r}" fill="none"
                  stroke="${score >= 70 ? '#84d4a8' : score >= 50 ? '#F4A261' : '#F4A261'}"
                  stroke-width="10" stroke-linecap="round"
                  stroke-dasharray="${c.toFixed(2)}"
                  stroke-dashoffset="${offset.toFixed(2)}"/>
        </svg>
        <div class="center">
          <div>
            <div class="num">${score}</div>
            <div class="lab">Reputation</div>
          </div>
        </div>
      </div>
      <div class="rep-info">
        <h2>Welcome back, ${escapeHtml(state.user.name.split(' ')[0])}</h2>
        <p>${score >= 80 ? 'Excellent reputation. Landlords trust you instantly.' : score >= 60 ? 'Strong reputation — keep adding verified tenancies.' : score >= 40 ? 'Your reputation is building. Add more tenancies to strengthen it.' : 'Just starting out. Add your first tenancy to start building.'}</p>
        <div class="profile-id-chip">
          <svg class="ic" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          ${escapeHtml(state.user.profileId)}
        </div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="lbl">Tenancies</div>
        <div class="val">${state.tenancies.length}</div>
        <div class="delta">${verifiedCount} verified</div>
      </div>
      <div class="stat-card">
        <div class="lbl">Avg rating</div>
        <div class="val">${avgRating}${avgRating !== '—' ? '★' : ''}</div>
      </div>
      <div class="stat-card">
        <div class="lbl">Documents</div>
        <div class="val">${state.documents.length}</div>
      </div>
      <div class="stat-card">
        <div class="lbl">Share links</div>
        <div class="val">${state.shareLinks.length}</div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
        <h4 class="section" style="margin: 0;">Recent tenancies</h4>
        <button class="btn btn-ghost btn-sm" onclick="switchTab('tenancies')">View all</button>
      </div>
      ${state.tenancies.length === 0 ? `
        <div class="empty-state">
          <h4>No tenancies yet</h4>
          <p style="margin: 4px 0 14px; font-size: 13px;">Add your first tenancy to start building your CV.</p>
          <button class="btn btn-primary" onclick="switchTab('tenancies')">Add tenancy</button>
        </div>
      ` : `
        <div class="timeline">
          ${state.tenancies.slice(0, 3).map(t => renderTenancyItem(t, false)).join('')}
        </div>
      `}
    </div>

    <div class="card">
      <h4 class="section">Public Rental CV</h4>
      <p style="font-size: 14px; color: var(--ink-soft); margin-bottom: 14px;">Your shareable CV at <b>credentia.app/cv/${escapeHtml(state.user.profileId)}</b></p>
      <button class="btn btn-primary" onclick="renderPublicCV()">Preview my Rental CV →</button>
    </div>
  `;
}

function saveProfile(e) {
  e.preventDefault();
  state.profile.name = $('#p-name').value.trim();

  state.profile.dob = $('#p-dob').value;

  state.profile.residencyType = $('#p-residency').value;
  state.user.name = state.profile.name;
  state.user.email = state.profile.email;
  persistSession();
  showToast('Profile saved');
  renderDashboard();
}

/* ─── Tenancies ─── */
function renderTenancyItem(t, withActions=true) {
  return `
    <div class="timeline-item ${t.thirdPartyVerified ? 'verified' : 'unverified'} ${t.hidden ? 'hidden-item' : ''}">
      <div class="ti-head">
        <div class="ti-prop">${escapeHtml(t.propertyName)}, ${escapeHtml(t.city)}</div>
        <div class="ti-date">${fmtDate(t.startDate)} – ${fmtDate(t.endDate)}</div>
      </div>
      <div class="ti-meta">
        Landlord: ${escapeHtml(t.linkedLandlord)}
        ${t.thirdPartyVerified ? '<span class="badge badge-verified">✓ Verified</span>' : '<span class="badge badge-pending">Unverified</span>'}
        ${t.hidden ? '<span class="badge badge-accent">Hidden</span>' : ''}
      </div>
      ${t.rating ? `<div class="ti-rating">${renderStars(t.rating)} <span style="font-size: 13px; color: var(--ink-soft);">${t.rating} / 5</span></div>` : ''}
      ${t.comment ? `<div class="ti-comment">"${escapeHtml(t.comment)}"</div>` : ''}
      ${withActions ? `
        <div class="ti-actions">
          <button class="btn btn-ghost btn-sm" onclick="editTenancy('${t.id}')">Edit</button>
          <button class="btn btn-ghost btn-sm" onclick="toggleHideTenancy('${t.id}')">${t.hidden ? 'Show' : 'Hide'}</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTenancy('${t.id}')">Delete</button>
        </div>
      ` : ''}
    </div>
  `;
}

function renderTenanciesTab() {
  return `
    <div class="page-head">
      <div>
        <h2>Tenancies</h2>
        <p>Build your Rental CV with verified tenancy history.</p>
      </div>
      <button class="btn btn-primary" onclick="openTenancy()">+ Add tenancy</button>
    </div>
    <div class="card">
      ${state.tenancies.length === 0 ? `
        <div class="empty-state">
          <h4>No tenancies yet</h4>
          <p style="margin: 4px 0 14px; font-size: 13px;">Add your first tenancy to start building your Rental CV.</p>
          <button class="btn btn-primary" onclick="openTenancy()">+ Add first tenancy</button>
        </div>
      ` : `
        <div class="timeline">
          ${state.tenancies.map(t => renderTenancyItem(t, true)).join('')}
        </div>
      `}
    </div>
  `;
}

function openTenancy(id) {
  $('#tenancyModalTitle').textContent = id ? 'Edit tenancy' : 'Add tenancy';
  $('#ten-id').value = id || '';
  if (id) {
    const t = state.tenancies.find(x => x.id === id);
    if (t) {
      $('#ten-prop').value = t.propertyName; $('#ten-city').value = t.city;
      $('#ten-start').value = t.startDate; $('#ten-end').value = t.endDate || '';
      $('#ten-landlord').value = t.linkedLandlord;
    }
  } else {
    $('#ten-prop').value = ''; $('#ten-city').value = '';
    $('#ten-start').value = ''; $('#ten-end').value = '';
    $('#ten-landlord').value = '';
  }
  $('#tenancyModal').classList.add('show');
}
function closeTenancy() { $('#tenancyModal').classList.remove('show'); }
function editTenancy(id) { openTenancy(id); }

function submitTenancy(e) {
  e.preventDefault();
  const id = $('#ten-id').value;
  const data = {
    propertyName: $('#ten-prop').value.trim(),
    city: $('#ten-city').value.trim(),
    startDate: $('#ten-start').value,
    endDate: $('#ten-end').value || null,
    linkedLandlord: $('#ten-landlord').value.trim(),
  };
  if (id) {
    const t = state.tenancies.find(x => x.id === id);
    if (t) Object.assign(t, data);
  } else {
    state.tenancies.unshift({
      id: 't_' + Date.now(), ...data,
      rating: null, comment: null,
      thirdPartyVerified: false, hidden: false,
    });
  }
  persistSession();
  closeTenancy();
  showToast(id ? 'Tenancy updated' : 'Tenancy added');
  renderDashboard();
}

function toggleHideTenancy(id) {
  const t = state.tenancies.find(x => x.id === id);
  if (t) { t.hidden = !t.hidden; persistSession(); showToast(t.hidden ? 'Tenancy hidden' : 'Tenancy visible'); renderDashboard(); }
}
function deleteTenancy(id) {
  if (!confirm('Delete this tenancy? This cannot be undone.')) return;
  state.tenancies = state.tenancies.filter(t => t.id !== id);
  persistSession(); showToast('Tenancy deleted'); renderDashboard();
}

  return `

      <div>
        <h2>Documents</h2>
        <p>Securely store ID, references, and proof of income.</p>
      </div>
      <button class="btn btn-primary" onclick="addMockDocument()">+ Upload document</button>

    <div class="card">
      ${state.documents.length === 0 ? `
        <div class="empty-state">
          <h4>No documents yet</h4>
          <p style="margin: 4px 0 14px; font-size: 13px;">Upload supporting documents to strengthen your profile.</p>
          <button class="btn btn-primary" onclick="addMockDocument()">Upload first document</button>
        </div>
      ` : state.documents.map(d => `
        <div class="doc-row">
          <div class="icon-wrap">
            <svg class="ic ic-lg" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
          </div>
          <div class="info">
            <div class="name">${escapeHtml(d.fileName)}</div>
            <div class="meta">${escapeHtml(d.type)} · ${escapeHtml(d.size||'—')} · Uploaded ${escapeHtml(d.uploadedAt)}</div>

          <button class="btn btn-danger btn-sm" onclick="deleteDocument('${d.id}')">Remove</button>
        </div>
      `).join('')}

function addMockDocument() {
  const types = ['Passport', 'Driving Licence', 'Bank Statement', 'Employer Reference', 'Previous Landlord Reference'];
  const type = types[Math.floor(Math.random() * types.length)];
  state.documents.unshift({
    id: 'd_' + Date.now(),
    fileName: type.toLowerCase().replace(/ /g, '_') + '.pdf',
    type,
    size: (Math.random() * 3 + 0.5).toFixed(1) + ' MB',
    uploadedAt: new Date().toISOString().split('T')[0],
  });
  persistSession(); showToast(`${type} uploaded`); renderDashboard();
}
function deleteDocument(id) {
  if (!confirm('Delete this document?')) return;
  state.documents = state.documents.filter(d => d.id !== id);
  persistSession(); showToast('Document deleted'); renderDashboard();
}

function openShare() { $('#shareModal').classList.add('show'); }
function closeShare() { $('#shareModal').classList.remove('show'); }

function createShareLink() {

  state.shareLinks.unshift({
    id: 'sl_' + Date.now(),
    token: generateToken(16),
    accessType: access,
    active: true,
    createdAt: Date.now(),
  });
  persistSession();
  closeShare();
  showToast('Share link generated');
  renderDashboard();
}
function deleteShareLink(id) {
  if (!confirm('Delete this share link? It will stop working immediately.')) return;
  state.shareLinks = state.shareLinks.filter(l => l.id !== id);
  persistSession(); showToast('Link deleted'); renderDashboard();
}
function previewShareLink(token) {
  state.viewingShareToken = token;
  renderPublicCV(true);
}

/* ─── Search ─── */
function renderSearchTab() {
  const q = state.searchQuery.trim().toLowerCase();
  const results = q
    ? DIRECTORY.filter(p =>
        p.profileId.toLowerCase().includes(q) ||
        p.name.toLowerCase().includes(q)
      )
    : DIRECTORY;

  return `
    <div class="page-head">
      <div>
        <h2>Search profiles</h2>
        <p>Look up tenants or landlords by Credentia ID or name.</p>
      </div>
    </div>
    <div class="search-box">
      <svg class="ic" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" placeholder="Search by Credentia ID (e.g. DEMO1234) or name"
             oninput="state.searchQuery=this.value; renderTab()" value="${escapeHtml(state.searchQuery)}"/>
    </div>
    ${results.length === 0
      ? `<div class="empty-state"><h4>No matches</h4><p style="font-size:13px; margin-top:4px;">Try a different search.</p></div>`
      : results.map(p => `
          <div class="search-result" onclick="viewDirectoryProfile('${p.profileId}')">

            <div class="info">
              <div class="name">${escapeHtml(p.name)}</div>

              <div class="score-lbl">Reputation</div>
            </div>
          </div>
        `).join('')
    }
  `;
}

function viewDirectoryProfile(profileId) {

    renderPublicCV(false);

  if (!p) return;
  showToast(`Viewing ${p.name}'s public CV (demo)`);
  // Render a stub public CV for directory profiles
  state.screen = 'cv';
  setShellUI();
  $('#main').innerHTML = `
    <div style="max-width: 800px; margin: 24px auto; padding: 0 16px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">

        <span class="badge badge-accent">DIRECTORY VIEW</span>
      </div>
      <div class="cv-page screen">
        <div class="cv-header">
          <h2>${escapeHtml(p.name)}</h2>
          <div class="sub">${p.role === 'tenant' ? 'Verified Rental CV' : 'Verified Landlord CV'} · ✓ Identity verified</div>
          <div class="profile-id-badge">
            <svg class="ic" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            ${escapeHtml(p.profileId)}
          </div>
        </div>
        <div class="cv-body">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px;">
            <div>
              <div class="section-label" style="margin-bottom:8px;">Reputation</div>
              <div style="font-family: var(--display); font-size: 48px; font-weight: 600; color: var(--ink); line-height: 1;">${p.score}<span style="font-size:20px; color: var(--ink-mute); font-weight: 400;"> / 100</span></div>
              <div style="font-size: 13px; color: var(--ink-soft); margin-top: 4px;">${p.score >= 80 ? 'Excellent' : p.score >= 60 ? 'Strong' : 'Building'}</div>
            </div>
            <div>
              <div class="section-label" style="margin-bottom:8px;">History</div>
              <div style="font-size: 14px; color: var(--ink);">${p.tenancies} verified tenanc${p.tenancies===1?'y':'ies'}</div>
            </div>
          </div>
          <p style="font-size: 13px; color: var(--ink-mute); font-style: italic;">To view full details, ${p.name.split(' ')[0]} would need to send you a share link.</p>
        </div>
      </div>
    </div>
  `;
}

/* ============================================================
   PUBLIC RENTAL CV
   ============================================================ */
function renderPublicCV(asShared=false) {
  state.screen = 'cv';
  setShellUI();
  const score = calcReputationScore();
  const visibleTenancies = state.tenancies.filter(t => !t.hidden);

  const accessType = asShared
    ? (state.shareLinks.find(l => l.token === state.viewingShareToken)?.accessType || 'full')
    : 'owner';
  // Settings depend on access type
  const settings = asShared
    ? (accessType === 'basic'
        ? { showEmail: false, showPhone: false, showDocuments: false, showTenancyHistory: false }
        : state.shareSettings)
    : { showEmail: true, showPhone: true, showDocuments: true, showTenancyHistory: true };

  $('#main').innerHTML = `
    <div style="max-width: 800px; margin: 24px auto; padding: 0 16px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px;">
        <button class="btn btn-ghost btn-sm" onclick="${asShared ? `state.tab='share'; renderDashboard()` : `renderDashboard()`}">← Back</button>
        ${asShared
          ? `<span class="badge badge-accent">${escapeHtml(accessType.toUpperCase())} ACCESS</span>`
          : '<button class="btn btn-primary btn-sm" onclick="window.print()">🖨 Print / Save PDF</button>'}
      </div>
      <div class="cv-page screen">
        <div class="cv-header">
          <h2>${escapeHtml(state.user.name)}</h2>
          <div class="sub">${state.user.role === 'tenant' ? 'Verified Rental CV' : 'Verified Landlord CV'} ${state.profile.verified ? '· ✓ Identity verified' : ''}</div>
          <div class="profile-id-badge">
            <svg class="ic" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            ${escapeHtml(state.user.profileId)}
          </div>
        </div>
        <div class="cv-body">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px;">
            <div>
              <div class="section-label" style="margin-bottom: 8px;">Reputation</div>
              <div style="font-family: var(--display); font-size: 48px; font-weight: 600; color: var(--ink); line-height: 1;">${score}<span style="font-size:20px; color: var(--ink-mute); font-weight: 400;"> / 100</span></div>
              <div style="font-size: 13px; color: var(--ink-soft); margin-top: 4px;">${score >= 80 ? 'Excellent' : score >= 60 ? 'Strong' : score >= 40 ? 'Building' : 'New'}</div>
            </div>
            <div>
              <div class="section-label" style="margin-bottom: 8px;">Contact</div>
              ${settings.showEmail ? `<div style="font-size:13px; color: var(--ink); margin-top: 4px;">📧 ${escapeHtml(state.profile.email)}</div>` : ''}
              ${settings.showPhone && state.profile.phone ? `<div style="font-size:13px; color: var(--ink); margin-top: 4px;">📞 ${escapeHtml(state.profile.phone)}</div>` : ''}
              ${state.profile.residencyType ? `<div style="font-size:13px; color: var(--ink); margin-top: 4px;">📍 ${escapeHtml(state.profile.residencyType)}</div>` : ''}
              ${!settings.showEmail && !settings.showPhone ? `<div style="font-size:12px; color: var(--ink-mute); margin-top: 4px; font-style: italic;">Contact hidden by share link settings</div>` : ''}
            </div>
          </div>

          ${settings.showTenancyHistory && visibleTenancies.length > 0 ? `
            <div style="margin-bottom: 28px;">
              <div class="section-label" style="margin-bottom: 16px;">Tenancy history (${visibleTenancies.length})</div>
              <div class="timeline">
                ${visibleTenancies.map(t => renderTenancyItem(t, false)).join('')}
              </div>
            </div>
          ` : !settings.showTenancyHistory ? `
            <div style="font-size: 12px; color: var(--ink-mute); font-style: italic; margin-bottom: 28px;">Tenancy history hidden by share link settings</div>
          ` : ''}

          ${settings.showDocuments && state.documents.length > 0 ? `
            <div>
              <div class="section-label" style="margin-bottom: 16px;">Verified documents (${state.documents.length})</div>
              ${state.documents.map(d => `
                <div class="doc-row" style="margin-bottom:6px;">
                  <div class="icon-wrap"><svg class="ic" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>
                  <div class="info"><div class="name">${escapeHtml(d.type)}</div><div class="meta">Verified · ${escapeHtml(d.uploadedAt)}</div></div>
                </div>
              `).join('')}
            </div>
          ` : ''}

          <div style="margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--line); text-align: center; font-size: 12px; color: var(--ink-mute);">
            Generated by Credentia · ${new Date().toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' })}
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ============================================================
   FEEDBACK
   ============================================================ */
function openFeedback() { $('#feedbackModal').classList.add('show'); }
function closeFeedback() { $('#feedbackModal').classList.remove('show'); }

async function submitFeedback() {
  const btn = $('#fbSubmit');
  const payload = {
    rating: state.fb.stars,
    tags: Array.from(state.fb.tags).join(', '),
    comment: $('#fbText').value.trim(),
    email: $('#fbEmail').value.trim(),
    role: state.user?.role || 'guest',
    screen: state.screen + (state.tab ? '/' + state.tab : ''),
    userAgent: navigator.userAgent,
    timestamp: new Date().toISOString(),
  };
  if (!payload.rating && !payload.comment && !payload.tags) {
    showToast('Please add a rating or comment first'); return;
  }
  btn.disabled = true; btn.textContent = 'Sending...';
  let ok = false;
  if (FEEDBACK_ENDPOINT) {
    try {
      await fetch(FEEDBACK_ENDPOINT, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(payload).toString(),
      });
      ok = true;
    } catch (err) { console.warn('Feedback POST failed', err); }
  }
  const prior = JSON.parse(localStorage.getItem('credentia.feedback') || '[]');
  prior.push(payload);
  localStorage.setItem('credentia.feedback', JSON.stringify(prior));
  btn.disabled = false; btn.textContent = 'Send feedback';
  closeFeedback();
  state.fb.stars = 0; state.fb.tags.clear();
  $$('#starRow .star').forEach(s => s.classList.remove('active'));
  $$('#pillGroup .pill').forEach(p => p.classList.remove('selected'));
  $('#fbText').value = ''; $('#fbEmail').value = '';
  showToast(ok ? 'Thank you! Feedback sent.' : (FEEDBACK_ENDPOINT ? 'Saved offline — will sync later' : 'Thanks! Saved locally.'));
}
</script>
