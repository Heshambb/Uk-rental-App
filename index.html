<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0B3D2E" />
<title>Credentia — Rental Trust, Verified</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F1EA;
    --surface: #FFFFFF;
    --surface-2: #FBF8F2;
    --ink: #0F1A14;
    --ink-soft: #4A5751;
    --ink-mute: #8A938E;
    --line: #E4DED1;
    --brand: #0B3D2E;
    --brand-2: #14583F;
    --accent: #D97A3C;
    --good: #2E7D5B;
    --warn: #C9892E;
    --bad: #B4452B;
    --shadow-sm: 0 1px 2px rgba(15,26,20,.04), 0 2px 6px rgba(15,26,20,.04);
    --shadow-md: 0 6px 20px rgba(15,26,20,.08), 0 2px 6px rgba(15,26,20,.04);
    --shadow-lg: 0 24px 60px rgba(15,26,20,.18);
    --r-sm: 10px;
    --r-md: 14px;
    --r-lg: 20px;
    --display: 'Fraunces', 'Times New Roman', serif;
    --body: 'Inter Tight', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--body);
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body::before {
    content:""; position: fixed; inset: 0; pointer-events: none;
    background-image: radial-gradient(circle at 1px 1px, rgba(15,26,20,.025) 1px, transparent 0);
    background-size: 3px 3px;
    z-index: 1;
  }
  .app { position: relative; min-height: 100vh; z-index: 2; }

  /* ---------- Topbar ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(244,241,234,.88);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    max-width: 1180px; margin: 0 auto;
    padding: 14px 22px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px;
    background: var(--brand); color: #fff;
    display: grid; place-items: center;
    font-family: var(--display); font-weight: 700; font-size: 17px;
    box-shadow: var(--shadow-sm);
  }
  .brand-name { font-family: var(--display); font-weight: 600; font-size: 21px; letter-spacing: -.01em; }
  .brand-name em { font-style: italic; color: var(--accent); font-weight: 600; }
  .role-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line);
    font-size: 12px; font-weight: 500; color: var(--ink-soft);
  }
  .role-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--good); }
  .top-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--surface);
    display: grid; place-items: center; cursor: pointer;
    color: var(--ink-soft);
    transition: all .15s ease;
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--ink-mute); }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tab {
    padding: 12px 16px; background: transparent; border: 0;
    font-family: var(--body); font-size: 14px; font-weight: 500;
    color: var(--ink-soft); cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: all .15s ease;
  }
  .tab.active { color: var(--brand); border-bottom-color: var(--brand); font-weight: 600; }
  .tab:hover:not(.active) { color: var(--ink); }
  .tab .badge {
    display: inline-block; margin-left: 6px;
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 1px 6px; border-radius: 999px;
    min-width: 17px; text-align: center;
  }

  main { max-width: 1180px; margin: 0 auto; padding: 22px 22px 100px; }

  /* ---------- Launcher ---------- */
  .launcher {
    min-height: calc(100vh - 70px);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 22px;
    position: relative;
  }
  .launcher-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .launcher-bg::before, .launcher-bg::after {
    content: ""; position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: .35;
  }
  .launcher-bg::before { width: 460px; height: 460px; background: var(--brand); top: -120px; left: -120px; }
  .launcher-bg::after { width: 380px; height: 380px; background: var(--accent); bottom: -100px; right: -80px; opacity: .22; }
  .launcher-card { max-width: 820px; width: 100%; position: relative; text-align: center; }
  .eyebrow {
    display: inline-flex; gap: 8px; align-items: center;
    padding: 6px 12px; border-radius: 999px;
    background: var(--surface); border: 1px solid var(--line);
    font-size: 12px; font-weight: 500; color: var(--ink-soft);
    letter-spacing: .02em; text-transform: uppercase;
    box-shadow: var(--shadow-sm);
  }
  .eyebrow .ping {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 0 rgba(217,122,60,.6);
    animation: ping 1.8s ease-out infinite;
  }
  @keyframes ping {
    0% { box-shadow: 0 0 0 0 rgba(217,122,60,.6); }
    100% { box-shadow: 0 0 0 14px rgba(217,122,60,0); }
  }
  h1.hero {
    font-family: var(--display); font-weight: 600;
    font-size: clamp(40px, 7vw, 72px);
    line-height: 1.02; letter-spacing: -.025em;
    margin: 22px 0 14px;
  }
  h1.hero em { font-style: italic; color: var(--accent); }
  .hero-sub { font-size: 17px; color: var(--ink-soft); max-width: 540px; margin: 0 auto 36px; }
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 680px; margin: 0 auto; }
  @media (max-width: 600px) { .role-grid { grid-template-columns: 1fr; } }
  .role-card {
    text-align: left; padding: 28px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    cursor: pointer;
    transition: all .25s cubic-bezier(.2,.7,.2,1);
    box-shadow: var(--shadow-sm);
    position: relative; overflow: hidden;
  }
  .role-card:hover { transform: translateY(-3px); border-color: var(--brand); box-shadow: var(--shadow-md); }
  .role-card .role-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: grid; place-items: center;
    margin-bottom: 18px;
  }
  .role-card.tenant .role-icon { background: rgba(217,122,60,.12); color: var(--accent); }
  .role-card.landlord .role-icon { background: rgba(11,61,46,.1); color: var(--brand); }
  .role-card h3 { font-family: var(--display); font-size: 24px; font-weight: 600; margin: 0 0 6px; letter-spacing: -.01em; }
  .role-card p { margin: 0 0 18px; color: var(--ink-soft); font-size: 14px; }
  .role-card .role-cta { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; font-size: 14px; color: var(--brand); }
  .role-card:hover .role-cta { gap: 10px; }
  .footer-note { margin-top: 40px; font-size: 12px; color: var(--ink-mute); }

  /* ---------- Buttons & Cards ---------- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px 18px; border-radius: 10px;
    font-family: var(--body); font-weight: 600; font-size: 14px;
    border: 1px solid transparent;
    cursor: pointer; transition: all .15s ease;
    text-decoration: none;
  }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-primary:hover { background: var(--brand-2); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .btn-ghost:hover { background: var(--surface); border-color: var(--ink-mute); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { filter: brightness(.95); }
  .btn-danger-ghost { background: transparent; color: var(--bad); border-color: rgba(180,69,43,.3); }
  .btn-danger-ghost:hover { background: rgba(180,69,43,.06); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .btn-block { width: 100%; }

  .page-head { margin-bottom: 22px; display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .page-head h2 { font-family: var(--display); font-weight: 600; font-size: 30px; letter-spacing: -.02em; margin: 0 0 4px; }
  .page-head p { color: var(--ink-soft); margin: 0; font-size: 14px; }

  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 22px;
    box-shadow: var(--shadow-sm);
  }
  .card + .card { margin-top: 14px; }

  h4.section { font-family: var(--display); font-size: 18px; font-weight: 600; margin: 0 0 12px; letter-spacing: -.01em; }
  .section-sub { color: var(--ink-mute); font-size: 12px; margin: 0 0 14px; }

  /* ---------- Form ---------- */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 12px; font-weight: 600; color: var(--ink-soft); letter-spacing: .02em; text-transform: uppercase; }
  .field input, .field select, .field textarea {
    font-family: var(--body); font-size: 15px;
    padding: 11px 13px; border-radius: 10px;
    border: 1px solid var(--line); background: var(--surface-2);
    color: var(--ink); transition: all .15s ease;
    outline: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--brand); background: var(--surface);
    box-shadow: 0 0 0 3px rgba(11,61,46,.08);
  }
  .field-hint { font-size: 12px; color: var(--ink-mute); }
  .form-actions { margin-top: 22px; display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }

  /* ---------- Avatar ---------- */
  .avatar {
    width: 46px; height: 46px; border-radius: 50%;
    display: grid; place-items: center;
    font-family: var(--display); font-weight: 600; font-size: 17px;
    color: #fff; flex-shrink: 0;
  }
  .avatar.sm { width: 36px; height: 36px; font-size: 14px; }
  .avatar.lg { width: 64px; height: 64px; font-size: 22px; }

  /* ---------- My profiles (tenant side) ---------- */
  .my-profile-row {
    display: flex; gap: 14px; align-items: center;
    padding: 14px; background: var(--surface-2);
    border: 1px solid var(--line); border-radius: 12px;
    margin-bottom: 8px;
  }
  .my-profile-row:last-child { margin-bottom: 0; }
  .my-profile-row .info { flex: 1; min-width: 0; }
  .my-profile-row .name { font-weight: 600; font-size: 15px; }
  .my-profile-row .sub { font-size: 12px; color: var(--ink-mute); margin-top: 2px; }
  .my-profile-row .actions { display: flex; gap: 6px; align-items: center; }
  .my-profile-row .score-mini {
    text-align: right; padding-right: 10px;
    border-right: 1px solid var(--line); margin-right: 4px;
  }
  .my-profile-row .score-mini .v { font-family: var(--display); font-weight: 600; font-size: 18px; line-height: 1; }
  .my-profile-row .score-mini .l { font-size: 10px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .04em; }

  .empty-state {
    text-align: center; padding: 36px 20px;
    border: 2px dashed var(--line); border-radius: 14px;
    color: var(--ink-mute);
  }
  .empty-state h4 { font-family: var(--display); font-size: 18px; color: var(--ink); margin: 6px 0 4px; font-weight: 600; }

  /* ---------- Search ---------- */
  .filter-row { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
  .search-box {
    flex: 1; min-width: 220px;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 10px;
  }
  .search-box input {
    border: 0; outline: 0; background: transparent;
    flex: 1; font-family: var(--body); font-size: 15px;
    color: var(--ink);
  }

  /* ---------- Tenant directory cards (landlord side) ---------- */
  .tenant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }
  .tenant-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); padding: 18px;
    cursor: pointer; transition: all .2s ease;
    box-shadow: var(--shadow-sm);
    position: relative;
  }
  .tenant-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--ink-mute); }
  .tenant-card.new::after {
    content: "NEW"; position: absolute; top: 14px; right: 14px;
    background: var(--accent); color: #fff;
    padding: 2px 8px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: .05em;
  }
  .tenant-top { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
  .tenant-name { font-family: var(--display); font-size: 18px; font-weight: 600; letter-spacing: -.01em; line-height: 1.2; }
  .tenant-meta { font-size: 12px; color: var(--ink-mute); margin-top: 2px; }

  .credit-status {
    padding: 12px; background: var(--surface-2);
    border-radius: 12px; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
    min-height: 56px;
  }
  .credit-status.locked { background: var(--surface-2); border: 1px dashed var(--line); }
  .credit-status.locked .label { font-size: 12px; color: var(--ink-mute); display: flex; align-items: center; gap: 6px; }
  .credit-status .score-label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .04em; }
  .credit-status .score-value { font-family: var(--display); font-weight: 600; font-size: 26px; line-height: 1; letter-spacing: -.02em; }
  .score-tag { padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .score-tag.excellent { background: rgba(46,125,91,.12); color: var(--good); }
  .score-tag.good { background: rgba(46,125,91,.10); color: var(--good); }
  .score-tag.fair { background: rgba(201,137,46,.12); color: var(--warn); }
  .score-tag.poor { background: rgba(180,69,43,.12); color: var(--bad); }
  .tenant-facts { display: flex; gap: 12px; font-size: 12px; color: var(--ink-soft); flex-wrap: wrap; }

  /* ---------- Property cards (marketplace) ---------- */
  .property-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }
  .property-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r-lg); overflow: hidden;
    cursor: pointer; transition: all .2s ease;
    box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column;
  }
  .property-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
  .property-photo {
    aspect-ratio: 4 / 3; position: relative;
    background: var(--surface-2); overflow: hidden;
  }
  .property-photo img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
    transition: transform .35s ease;
  }
  .property-card:hover .property-photo img { transform: scale(1.04); }
  .property-photo .qualify-badge {
    position: absolute; top: 12px; left: 12px;
    padding: 4px 10px; border-radius: 999px;
    background: rgba(255,255,255,.95);
    backdrop-filter: blur(6px);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; gap: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .qualify-badge.qualifies { color: var(--good); }
  .qualify-badge.does-not { color: var(--bad); }
  .qualify-badge.unknown { color: var(--ink-soft); }
  .property-photo .ll-rating {
    position: absolute; top: 12px; right: 12px;
    padding: 4px 10px; border-radius: 999px;
    background: rgba(15,26,20,.78);
    color: #fff; font-size: 11px; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
    backdrop-filter: blur(4px);
  }
  .property-body { padding: 16px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .property-rent { font-family: var(--display); font-size: 20px; font-weight: 600; letter-spacing: -.01em; line-height: 1; }
  .property-rent .unit { font-size: 12px; color: var(--ink-mute); font-weight: 400; margin-left: 2px; }
  .property-addr { font-size: 14px; font-weight: 600; color: var(--ink); }
  .property-meta { font-size: 12px; color: var(--ink-mute); }
  .property-foot {
    margin-top: 8px; padding-top: 10px; border-top: 1px dashed var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--ink-soft);
  }
  .property-foot .min-score { display: inline-flex; align-items: center; gap: 4px; font-weight: 600; }
  .property-foot .min-score .lock { color: var(--ink-mute); }

  .property-card.applied .applied-tag {
    position: absolute; bottom: 12px; right: 12px;
    background: var(--brand); color: #fff;
    padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700;
  }

  /* ---------- Property detail ---------- */
  .property-hero {
    position: relative; aspect-ratio: 16 / 7;
    background: var(--surface-2); border-radius: var(--r-lg); overflow: hidden;
    margin-bottom: 18px;
  }
  .property-hero img { width: 100%; height: 100%; object-fit: cover; }
  @media (max-width: 600px) { .property-hero { aspect-ratio: 4 / 3; } }

  .detail-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
  @media (max-width: 880px) { .detail-grid { grid-template-columns: 1fr; } }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 11px; border-radius: 8px;
    background: transparent; border: 1px solid var(--line);
    color: var(--ink-soft); cursor: pointer;
    font-size: 13px; font-weight: 500;
    margin-bottom: 14px;
  }
  .back-btn:hover { background: var(--surface); color: var(--ink); }

  .qualification-banner {
    padding: 14px 18px; border-radius: 12px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
    font-size: 14px;
  }
  .qualification-banner.qualifies { background: rgba(46,125,91,.1); border: 1px solid rgba(46,125,91,.25); color: var(--good); }
  .qualification-banner.does-not { background: rgba(180,69,43,.08); border: 1px solid rgba(180,69,43,.2); color: var(--bad); }
  .qualification-banner.unknown { background: rgba(201,137,46,.08); border: 1px solid rgba(201,137,46,.2); color: var(--warn); }
  .qualification-banner b { font-weight: 700; }

  .landlord-strip {
    display: flex; gap: 12px; align-items: center;
    padding: 14px; background: var(--surface-2);
    border-radius: 12px;
    cursor: pointer; transition: all .15s ease;
    border: 1px solid var(--line);
  }
  .landlord-strip:hover { background: var(--surface); border-color: var(--ink-mute); }
  .landlord-strip .info { flex: 1; min-width: 0; }
  .landlord-strip .name { font-weight: 600; font-size: 14px; }
  .landlord-strip .sub { font-size: 12px; color: var(--ink-mute); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
  .star-rating { display: inline-flex; align-items: center; gap: 4px; font-weight: 600; color: var(--accent); }

  /* ---------- Tenant detail (existing) ---------- */
  .profile-head { display: flex; gap: 16px; align-items: center; margin-bottom: 18px; }
  .profile-head .avatar { width: 64px; height: 64px; font-size: 22px; }
  .profile-head h3 { font-family: var(--display); font-size: 26px; font-weight: 600; margin: 0 0 2px; letter-spacing: -.01em; }
  .profile-head .meta { color: var(--ink-soft); font-size: 14px; }

  .data-list { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
  @media (max-width: 480px) { .data-list { grid-template-columns: 1fr; } }
  .data-list dt { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
  .data-list dd { margin: 0; font-size: 14px; color: var(--ink); font-weight: 500; }
  .ssn-mask { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  /* Credit fetch */
  .credit-panel { text-align: center; }
  .credit-panel .icon-wrap {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(11,61,46,.08); color: var(--brand);
    display: grid; place-items: center; margin: 0 auto 14px;
  }
  .credit-panel h4 { font-family: var(--display); font-size: 20px; font-weight: 600; margin: 0 0 6px; letter-spacing: -.01em; }
  .credit-panel p.sub { color: var(--ink-soft); font-size: 13px; margin: 0 0 18px; }

  .fetch-stages { font-size: 13px; color: var(--ink-soft); margin: 14px 0; min-height: 60px; }
  .fetch-stage { display: flex; align-items: center; gap: 8px; padding: 6px 0; opacity: .4; transition: opacity .25s; }

  .typing { display: inline-flex; gap: 3px; padding: 12px 14px; background: var(--surface-2); border-radius: 16px; border-bottom-left-radius: 4px; align-self: flex-start; border: 1px solid var(--line); }

<div class="app" id="app">

/* === INIT ================================================ */
function init() {
  const storedT = JSON.parse(localStorage.getItem('credentia.tenants') || '[]');
  state.tenants = [...storedT, ...SEED_TENANTS];
  const storedP = JSON.parse(localStorage.getItem('credentia.properties') || 'null');
  state.properties = storedP || SEED_PROPERTIES.slice();
  state.applications = JSON.parse(localStorage.getItem('credentia.applications') || '[]');
  state.threads = JSON.parse(localStorage.getItem('credentia.threads') || '{}');
  const fc = JSON.parse(sessionStorage.getItem('credentia.fetched') || '[]');
  state.fetchedCredit = new Set(fc);
  // restore "me as tenant" choice if any
  state.activeTenantId = localStorage.getItem('credentia.activeTenantId') || null;
  state.activeLandlordId = localStorage.getItem('credentia.activeLandlordId') || 'll_1';
  renderLauncher();
}
window.addEventListener('DOMContentLoaded', init);

/* === HELPERS ============================================= */
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const initials = (name) => name.split(/\s+/).map(n => n[0]).slice(0,2).join('').toUpperCase();
function showToast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__tt); window.__tt = setTimeout(() => t.classList.remove('show'), 2400);
}
function scoreBand(s) {
  if (s >= 780) return { label:'Excellent', cls:'excellent', color:'#2E7D5B' };
  if (s >= 720) return { label:'Good',      cls:'good',      color:'#2E7D5B' };
  if (s >= 670) return { label:'Fair',      cls:'fair',      color:'#C9892E' };
  return         { label:'Poor',      cls:'poor',      color:'#B4452B' };
}
function getLandlord(id) { return LANDLORDS.find(l => l.id === id); }
function getTenant(id) { return state.tenants.find(t => t.id === id); }
function getProperty(id) { return state.properties.find(p => p.id === id); }
function getMyTenant() {
  return state.activeTenantId ? getTenant(state.activeTenantId) : null;
}
function persistTenants() {
  // only persist user-created tenants (those not in SEED)
  const seedIds = new Set(SEED_TENANTS.map(s => s.id));
  const userMade = state.tenants.filter(t => !seedIds.has(t.id));
  localStorage.setItem('credentia.tenants', JSON.stringify(userMade));
}
function persistProperties() { localStorage.setItem('credentia.properties', JSON.stringify(state.properties)); }
function persistApplications() { localStorage.setItem('credentia.applications', JSON.stringify(state.applications)); }
function persistThreads() { localStorage.setItem('credentia.threads', JSON.stringify(state.threads)); }
function persistFetched() { sessionStorage.setItem('credentia.fetched', JSON.stringify(Array.from(state.fetchedCredit))); }

function setRoleUI() {
  $('#topbar').classList.toggle('hidden', state.screen === 'launcher');
  $('#fab').classList.toggle('hidden', state.screen === 'launcher');
  const extra = $('#topbarExtra');
  if (state.role === 'landlord') {
    $('#roleLabel').textContent = `Landlord · ${getLandlord(state.activeLandlordId)?.name.split(' ')[0]}`;
    extra.innerHTML = `
      <select class="persona-select" onchange="switchLandlordPersona(this.value)">
        ${LANDLORDS.map(l => `<option value="${l.id}" ${l.id===state.activeLandlordId?'selected':''}>${escapeHtml(l.name)} · ★${l.rating}</option>`).join('')}
      </select>`;
  } else if (state.role === 'tenant') {
    const me = getMyTenant();
    $('#roleLabel').textContent = me ? `Tenant · ${me.name.split(' ')[0]}` : 'Tenant';
    extra.innerHTML = '';
  } else {
    extra.innerHTML = '';
  }
}

function switchLandlordPersona(id) {
  state.activeLandlordId = id;
  localStorage.setItem('credentia.activeLandlordId', id);
  showToast(`Switched to ${getLandlord(id).name}`);
  renderRoleShell();
}

function setMyTenant(id) {
  state.activeTenantId = id;
  if (id) localStorage.setItem('credentia.activeTenantId', id);
  else localStorage.removeItem('credentia.activeTenantId');
  setRoleUI();
}

/* Compute qualification status for a property given my tenant score */
function qualificationFor(prop) {
  const me = getMyTenant();
  if (!me) return 'unknown';
  return me.creditScore >= prop.minScore ? 'qualifies' : 'does-not';
}

/* === ROLE SHELL (tabs) =================================== */
function renderRoleShell() {
  state.screen = 'role-app';
  setRoleUI();

  const tabs = state.role === 'tenant' ? [
    { key:'marketplace', label:'Marketplace' },
    { key:'applications', label:'My Applications', badge: myApplicationsCount() },
    { key:'profile', label:'My Profile' },
    { key:'messages', label:'Messages' },
  ] : [
    { key:'listings', label:'My Listings' },
    { key:'applicants', label:'Applicants', badge: myApplicantsCount() },
    { key:'tenants', label:'Find Tenants' },
    { key:'messages', label:'Messages' },
  ];

  $('#main').innerHTML = `
    <section class="screen">
      <div class="tabs">
        ${tabs.map(t => `
          <button class="tab ${state.tab===t.key?'active':''}" onclick="switchTab('${t.key}')">
            ${t.label}${t.badge > 0 ? `<span class="badge">${t.badge}</span>` : ''}
          </button>
        `).join('')}
      </div>
      <div id="tabContent"></div>
    </section>
  `;
  renderTab();
}

function switchTab(key) {
  state.tab = key;
  renderRoleShell();
}

function renderTab() {
  const m = $('#tabContent');
  if (state.role === 'tenant') {
    if (state.tab === 'marketplace') m.innerHTML = renderMarketplace();
    else if (state.tab === 'applications') m.innerHTML = renderMyApplications();
    else if (state.tab === 'profile') m.innerHTML = renderTenantProfileTab();
    else if (state.tab === 'messages') renderMessages();
  } else {
    if (state.tab === 'listings') m.innerHTML = renderMyListings();
    else if (state.tab === 'applicants') m.innerHTML = renderApplicantsTab();
    else if (state.tab === 'tenants') m.innerHTML = renderTenantDirectory();
    else if (state.tab === 'messages') renderMessages();
  }
}

function myApplicationsCount() {
  if (!state.activeTenantId) return 0;
  return state.applications.filter(a => a.tenantId === state.activeTenantId).length;
}
function myApplicantsCount() {
  const myProps = state.properties.filter(p => p.landlordId === state.activeLandlordId);
  const propIds = new Set(myProps.map(p => p.id));
  return state.applications.filter(a => propIds.has(a.propertyId) && a.status === 'pending').length;
}

function renderPropertyCard(p) {
  const ll = getLandlord(p.landlordId);
  const photos = getPhotos(p.photoTag);
  const qual = qualificationFor(p);
  const me = getMyTenant();
  const applied = me && state.applications.some(a => a.propertyId === p.id && a.tenantId === me.id);

  const qualLabel = qual === 'qualifies' ? '✓ You qualify' :
                    qual === 'does-not' ? `✗ Need ${p.minScore}+` :
                    `${p.minScore}+ required`;

  return `
    <div class="property-card ${applied ? 'applied' : ''}" onclick="openProperty('${p.id}')">
      <div class="property-photo">
        <img src="${photos[0]}" alt="${escapeHtml(p.address)}" loading="lazy" onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg, var(--brand), var(--brand-2))'"/>
        <div class="qualify-badge ${qual}">${qualLabel}</div>
        <div class="ll-rating">★ ${ll?.rating || '—'}</div>

function applyToProperty(propertyId) {
  const me = getMyTenant();
  if (!me) {
    showToast('Create a profile first');
    switchTab('profile');
    return;
  }
  // Don't double-apply
  if (state.applications.some(a => a.propertyId === propertyId && a.tenantId === me.id)) {
    showToast('Already applied to this property');
    return;
  }
  state.applications.unshift({
    id: 'app_' + Date.now(),
    propertyId, tenantId: me.id,
    status: 'pending',
    createdAt: Date.now(),
  });
  persistApplications();
  showToast('Application sent!');
  openProperty(propertyId); // re-render to show applied state
}

function timeAgo(ts) {
  const s = (Date.now() - ts) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + ' min ago';
  if (s < 86400) return Math.floor(s/3600) + ' hr ago';
  return Math.floor(s/86400) + ' days ago';
}

function submitTenant(e) {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  const ssnDigits = String(data.ssn).replace(/\D/g,'');
  const maskedSsn = ssnDigits.length >= 4 ? `***-**-${ssnDigits.slice(-4)}` : '***-**-****';
  const inc = Number(data.income) || 0;
  const score = Math.max(620, Math.min(820, Math.round(660 + Math.random()*120 + Math.min(60, inc/100))));
  const COLORS = ["#0B3D2E","#D97A3C","#14583F","#B4452B","#C9892E"];
  const newTenant = {
    id: 't_' + Date.now(),
    name: data.name, age: Number(data.age), occupation: data.occupation,
    employer: data.employer, income: inc, city: data.city,
    ssn: maskedSsn, phone: data.phone, email: data.email,
    creditScore: score, isNew: true,
    color: COLORS[Math.floor(Math.random()*COLORS.length)]
  };
  state.tenants = [newTenant, ...state.tenants];
  persistTenants();
  // auto-activate this profile
  setMyTenant(newTenant.id);
  showToast(`Profile created — credit score ${score}`);
  state.tab = 'profile';
  renderRoleShell();
}

function renderCreditReport(t) {
  const b = scoreBand(t.creditScore);
  const pct = Math.max(0, Math.min(1, (t.creditScore - 300) / 550));
  const angle = -90 + pct * 180;
  const R = 90, cx = 110, cy = 110;
  const rad = (a) => a * Math.PI / 180;
  const nx = cx + R * Math.cos(rad(angle));
  const ny = cy + R * Math.sin(rad(angle));
  const hist = HISTORY_BY_BAND[b.cls] || HISTORY_BY_BAND.good;
  const onTime = hist.filter(h => h.type === 'paid').length;

  return `
    <h4 class="section" style="display:flex; align-items:center; justify-content:space-between;">
      Credit report
      <span style="font-size:11px; color:var(--good); font-weight:500;">✓ Just fetched</span>
    </h4>
    <div class="credit-gauge">
      <svg viewBox="0 0 220 130">
        <defs>
          <linearGradient id="gaugeGrad" x1="0" x2="1" y1="0" y2="0">
            <stop offset="0%" stop-color="#B4452B"/><stop offset="40%" stop-color="#C9892E"/>
            <stop offset="70%" stop-color="#2E7D5B"/><stop offset="100%" stop-color="#0B3D2E"/>
          </linearGradient>
        </defs>
        <path d="M 20 110 A 90 90 0 0 1 200 110" fill="none" stroke="#E4DED1" stroke-width="14" stroke-linecap="round"/>
        <path d="M 20 110 A 90 90 0 0 1 200 110" fill="none" stroke="url(#gaugeGrad)" stroke-width="14" stroke-linecap="round"
              stroke-dasharray="${(pct * Math.PI * 90).toFixed(1)} 999"/>
        <circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="7" fill="#fff" stroke="${b.color}" stroke-width="3"/>
      </svg>
      <div class="number"><div class="num" style="color:${b.color}">${t.creditScore}</div><div class="lab">${b.label} · 300–850</div></div>
    </div>
    <div class="stat-row"><span class="k">On-time payments</span><span class="v">${onTime} / ${hist.length}</span></div>
    <div class="stat-row"><span class="k">Open credit lines</span><span class="v">${Math.max(1, Math.round(t.creditScore/200))}</span></div>
    <div class="stat-row"><span class="k">Credit age</span><span class="v">${Math.max(1, Math.round((t.creditScore-600)/50))} yrs</span></div>
    <div class="stat-row"><span class="k">Report source</span><span class="v" style="font-size:12px; color:var(--ink-mute);">Credentia Bureau</span></div>
  `;
}

function renderHistoryList(t) {

async function fetchCredit(tenantId) {
  const t = getTenant(tenantId);
  if (!t) return;
  const card = $('#creditCard');
  card.innerHTML = `
    <div class="credit-panel">
      <div class="icon-wrap"><div class="spinner" style="width:28px; height:28px; border-width:3px;"></div></div>
      <h4>Fetching credit report…</h4>
      <p class="sub">Securely contacting Credentia Bureau</p>
      <div class="fetch-stages" id="fetchStages">
        <div class="fetch-stage" data-stage="0"><div class="stage-icon"><div class="spinner"></div></div><span>Authenticating request</span></div>
        <div class="fetch-stage" data-stage="1"><div class="stage-icon"><div class="spinner"></div></div><span>Verifying identity with bureau</span></div>
        <div class="fetch-stage" data-stage="2"><div class="stage-icon"><div class="spinner"></div></div><span>Pulling credit report</span></div>
      </div>
    </div>
  `;
  const stages = $$('#fetchStages .fetch-stage');
  const setStage = (i, status) => {
    const el = stages[i]; if (!el) return;
    if (status === 'active') {
      el.classList.add('active');
      el.querySelector('.stage-icon').innerHTML = `<div class="spinner"></div>`;
    } else if (status === 'done') {
      el.classList.remove('active'); el.classList.add('done');
      el.querySelector('.stage-icon').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`;
    }
  };
  setStage(0, 'active'); await new Promise(r => setTimeout(r, 700));
  setStage(0, 'done'); setStage(1, 'active'); await new Promise(r => setTimeout(r, 900));
  setStage(1, 'done'); setStage(2, 'active'); await new Promise(r => setTimeout(r, 1100));
  setStage(2, 'done'); await new Promise(r => setTimeout(r, 350));

  state.fetchedCredit.add(tenantId);
  persistFetched();
  card.innerHTML = renderCreditReport(t);
  const histCard = $('#historyCard');
  if (histCard) {
    histCard.style.opacity = '1';
    $('#historyList').innerHTML = renderHistoryList(t);
    histCard.querySelector('.section-sub').textContent = 'Last 6 months across verified rentals';
  }
  showToast(`Credit score: ${t.creditScore} · ${scoreBand(t.creditScore).label}`);
}

/* ========================================================= */
/* CHAT                                                       */
/* ========================================================= */
function threadKey(otherType, otherId) {
  // Different keys for tenant→landlord vs landlord→tenant so threads don't bleed
  return `${state.role}:${otherType}:${otherId}`;
}

function openChatWith(otherType, otherId) {
  state.tab = 'messages';
  state.chatPeer = { type: otherType, id: otherId };
  const key = threadKey(otherType, otherId);
  if (!state.threads[key] || !state.threads[key].length) {
    const greeting = state.role === 'tenant'
      ? "Hi! Thanks for getting in touch about the property."
      : "Hi! Thanks for considering my application. Happy to answer any questions.";
    state.threads[key] = [{ from:'them', text: greeting, ts: Date.now()-60000 }];
    persistThreads();
  }
  renderRoleShell();
}

function renderMessages() {
  // Find candidates depending on role
  let candidates = [];
  if (state.role === 'tenant') {
    candidates = LANDLORDS.map(l => ({ type:'landlord', id:l.id, name:l.name, sub:l.company, color:l.avatar }));
  } else {
    candidates = state.tenants.map(t => ({ type:'tenant', id:t.id, name:t.name, sub:t.occupation, color:t.color }));
  }
  if (!state.chatPeer) {
    // pick the first candidate, or someone with existing thread
    const withThreads = candidates.filter(c => state.threads[threadKey(c.type, c.id)]?.length);
    state.chatPeer = (withThreads[0] || candidates[0]) ? { type: (withThreads[0]||candidates[0]).type, id: (withThreads[0]||candidates[0]).id } : null;
  }
  if (!state.chatPeer) {
    $('#tabContent').innerHTML = `<div class="empty-state"><h4>No conversations yet</h4></div>`;
    return;
  }
  const peer = candidates.find(c => c.id === state.chatPeer.id);
  if (!peer) {
    $('#tabContent').innerHTML = `<div class="empty-state"><h4>Person not found</h4></div>`;
    return;
  }

  $('#tabContent').innerHTML = `
    <div class="chat-page">
      <aside class="chat-sidebar">
        <h4>Conversations</h4>
        ${candidates.map(c => {
          const k = threadKey(c.type, c.id);
          const last = state.threads[k]?.slice(-1)[0]?.text || 'Start a conversation';
          return `
            <div class="chat-thread ${c.id===state.chatPeer.id?'active':''}" onclick="openChatWith('${c.type}','${c.id}')">
              <div class="avatar sm" style="background:${c.color}">${initials(c.name)}</div>
              <div class="info">
                <div class="name">${escapeHtml(c.name)}</div>
                <div class="preview">${escapeHtml(last)}</div>
              </div>
            </div>
          `;
        }).join('')}
      </aside>
      <div class="chat-main">
        <div class="chat-head">
          <div class="avatar" style="background:${peer.color}">${initials(peer.name)}</div>
          <div style="flex:1">
            <div class="name">${escapeHtml(peer.name)}</div>
            <div class="status">Online now</div>
          </div>
          <div class="role-pill"><span class="dot"></span>Verified</div>
        </div>
        <div class="chat-body" id="chatBody"></div>
        <div class="quick-replies">
          <button onclick="quickSend('${state.role==='tenant'?'Is the property still available?':'When could you move in?'}')">${state.role==='tenant'?'Still available?':'When could you move in?'}</button>
          <button onclick="quickSend('Could we arrange a viewing?')">Viewing?</button>
          <button onclick="quickSend('What is your earliest move-in date?')">Move-in date?</button>
        </div>
        <form class="chat-input" onsubmit="return sendMessage(event)">
          <input id="chatInput" type="text" placeholder="Type a message..." autocomplete="off"/>
          <button type="submit" aria-label="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
          </button>
        </form>
      </div>
    </div>
  `;
  paintMessages();
}

function paintMessages() {
  const key = threadKey(state.chatPeer.type, state.chatPeer.id);
  const body = $('#chatBody');
  const msgs = state.threads[key] || [];
  body.innerHTML = msgs.map(m => `
    <div class="msg ${m.from==='me'?'me':'them'}">
      ${escapeHtml(m.text)}
      <span class="ts">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
    </div>
  `).join('');
  body.scrollTop = body.scrollHeight;
}

function sendMessage(e) {
  e.preventDefault();
  const input = $('#chatInput');
  const text = input.value.trim();
  if (!text) return false;
  const key = threadKey(state.chatPeer.type, state.chatPeer.id);
  state.threads[key] = state.threads[key] || [];
  state.threads[key].push({ from:'me', text, ts: Date.now() });
  persistThreads();
  input.value = '';
  paintMessages();
  showTyping();
  setTimeout(() => {
    removeTyping();
    const reply = SCRIPTED_REPLIES[Math.floor(Math.random()*SCRIPTED_REPLIES.length)];
    state.threads[key].push({ from:'them', text: reply, ts: Date.now() });
    persistThreads();
    paintMessages();
  }, 900 + Math.random()*800);
  return false;
}

function quickSend(text) {
  $('#chatInput').value = text;
  $('.chat-input').dispatchEvent(new Event('submit', { cancelable: true }));
}
function showTyping() {
  const body = $('#chatBody');
  const el = document.createElement('div');
  el.className = 'typing'; el.id = 'typingEl';
  el.innerHTML = '<span></span><span></span><span></span>';
  body.appendChild(el);
  body.scrollTop = body.scrollHeight;
}
function removeTyping() { const e = $('#typingEl'); if (e) e.remove(); }

/* FEEDBACK                                                   */
/* ========================================================= */
function openFeedback() { $('#feedbackModal').classList.add('show'); }
function closeFeedback() { $('#feedbackModal').classList.remove('show'); }

$('#starRow').addEventListener('click', (e) => {
  const b = e.target.closest('.star'); if (!b) return;
  state.fb.stars = Number(b.dataset.v);
  $$('#starRow .star').forEach((s,i) => s.classList.toggle('active', i < state.fb.stars));
});
$('#pillGroup').addEventListener('click', (e) => {
  const p = e.target.closest('.pill'); if (!p) return;
  const t = p.dataset.tag;
  if (state.fb.tags.has(t)) { state.fb.tags.delete(t); p.classList.remove('selected'); }
  else { state.fb.tags.add(t); p.classList.add('selected'); }
});

async function submitFeedback() {
  const btn = $('#fbSubmit');
  const payload = {
    rating: state.fb.stars,
    tags: Array.from(state.fb.tags).join(', '),
    comment: $('#fbText').value.trim(),
    email: $('#fbEmail').value.trim(),
    role: state.role || 'unknown',
    screen: state.screen + (state.tab ? '/' + state.tab : ''),
    userAgent: navigator.userAgent,
    timestamp: new Date().toISOString(),
  };
  if (!payload.rating && !payload.comment && !payload.tags) {
    showToast('Please add a rating or comment first'); return;
  }
  btn.disabled = true; btn.textContent = 'Sending...';
  let ok = false;
  if (FEEDBACK_ENDPOINT) {
    try {
      await fetch(FEEDBACK_ENDPOINT, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams(payload).toString(),
      });
      ok = true;
    } catch (err) { console.warn('Feedback POST failed', err); }
  }
  const prior = JSON.parse(localStorage.getItem('credentia.feedback') || '[]');
  prior.push(payload);
  localStorage.setItem('credentia.feedback', JSON.stringify(prior));
  btn.disabled = false; btn.textContent = 'Send feedback';
  closeFeedback();
  state.fb.stars = 0; state.fb.tags.clear();
  $$('#starRow .star').forEach(s => s.classList.remove('active'));
  $$('#pillGroup .pill').forEach(p => p.classList.remove('selected'));
  $('#fbText').value = ''; $('#fbEmail').value = '';
  showToast(ok ? 'Thank you! Feedback sent.' : (FEEDBACK_ENDPOINT ? 'Saved offline — will sync later' : 'Thanks! Saved locally.'));
}
</script>

</body>
</html>
